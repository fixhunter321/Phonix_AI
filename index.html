<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phonix A.I — Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="bot-avatar"><img src="wwwfahh.jpg" class="botfirst"></div>
      <div class="bot-info">
        <h1>phonix AI</h1>
        <div class="bot-status">
          <div class="status-dot"></div>
          Online &amp; Ready
        </div>
      </div>
    </div>
    <div class="header-right">v0.1.1</div>
  </header>

  <!-- MESSAGES -->
  <div id="messages">
    <div class="welcome" id="welcome-screen">
      <div class="welcome-icon">✦</div>
      <h2>I'am AI made by danish</h2>

      <div class="suggestion-chips">
        <button class="chip" onclick="sendChip(this)">Apa itu AI?</button>
        <button class="chip" onclick="sendChip(this)">Halo, siapa kamu?</button>
        <button class="chip" onclick="sendChip(this)">Cerita tentang dirimu</button>
        <button class="chip" onclick="sendChip(this)">Bantuin gw belajar coding</button>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <footer>
    <div class="input-wrapper" id="input-wrapper">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Ketik pesanmu di sini..."
      ></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Kirim">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3.4 2.1L21.5 11.1C22.2 11.5 22.2 12.5 21.5 12.9L3.4 21.9C2.6 22.3 1.7 21.6 2 20.7L4.5 13L2 5.3C1.7 2.4 2.6 1.7 3.4 2.1ZM4.5 13L12 13.5L4.5 6.5V13Z"/>
        </svg>
      </button>
    </div>
    <div class="footer-hint">Enter = kirim &nbsp;·&nbsp; Shift+Enter = baris baru</div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
